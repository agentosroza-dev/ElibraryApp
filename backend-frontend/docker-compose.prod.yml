services:
  app:
    build: .
    image: code-blue.cloud:latest
    container_name: code-blue.cloud-container
    volumes:
      - ./:/var/www/html
      - node:/var/www/html/node_modules
      - laravel:/var/www/html/vendor
    command: sh /var/www/html/production.sh
    ports:
      - 8080:80
      - 9080:8080
    depends_on:
      - mysql
    environment:
      # Application Settings
      APP_NAME: code-blue
      APP_ENV: production
      APP_DEBUG: false
      APP_URL: https://code-blue.cloud
      APP_FRONTEND_URL: https://code-blue.cloud
      APP_EMAIL_VERIFICATION_URL: "https://code-blue.cloud/email/verify"
      APP_PASSWORD_RESET_URL: "https://code-blue.cloud/password/reset"

      # Google OAuth (CRITICAL)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URL: "https://code-blue.cloud/api/auth/google/callback"


      # Reverb Configuration
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: ${REVERB_APP_ID}
      REVERB_APP_KEY: ${REVERB_APP_KEY}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      REVERB_HOST: "0.0.0.0"
      REVERB_PORT: 8080
      REVERB_SCHEME: "http"
      REVERB_PATH: "/reverb"


      # Database Configuration
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}

  #VPS MySQl
  mysql:
    image: mariadb:10.11.13
    container_name: mysql-code-blue.cloud-container
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: UTC
    command: --sql-mode="STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_AUTO_CREATE_USER,NO_ENGINE_SUBSTITUTION"
    volumes:
      - mysql:/var/lib/mysql
    ports:
      - 3306:3306

  #VPS have phpmyadmin
  phpmyadmin:
    image: phpmyadmin:5.2.2
    container_name: phpmyadmin-code-blue.cloud-container
    depends_on:
      - mysql
    environment:
      UPLOAD_LIMIT: 50M
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_ABSOLUTE_URI: "/phpmyadmin/"
    ports:
      - 9000:80

volumes:
  mysql:
    name: code-blue.cloud-mysql
  node:
    name: code-blue.cloud-node
  laravel:
    name: code-blue.cloud-laravel
