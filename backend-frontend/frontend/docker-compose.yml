services:
  vue-development:
    build:
      context: .
      target: development
    image: my-front-development:latest
    container_name: my-front-development-container
    command: 'sh /app/start.sh'
    volumes:
      - ./:/app
    ports:
      - 5173:5173
    tty: true
    stdin_open: true
    environment:
      VITE_HMR_PORT: 5173
      VITE_API_URL: http://localhost:8080/api

      #puhser code
#      VITE_REVERB_APP_KEY: "fr6ej145c0m9njsh6npy"
